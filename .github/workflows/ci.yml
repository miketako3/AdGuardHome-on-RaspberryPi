name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Make is available
        run: make --version

      - name: Install htpasswd
        run: |
          sudo apt-get update
          sudo apt-get install -y apache2-utils

      - name: Run provisioning tests
        run: make test
